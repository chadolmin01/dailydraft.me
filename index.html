<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Draft</title>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZDEFY0F999"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ZDEFY0F999');
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&family=Nanum+Gothic+Coding:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Noto Sans KR"', 'sans-serif'],
              mono: ['"JetBrains Mono"', '"Nanum Gothic Coding"', 'monospace'],
            },
            colors: {
              draft: {
                black: '#222222', // Softer black
                gray: '#666666',
                light: '#F4F4F5',
                paper: '#FFFFFF',
                blue: '#0052CC',
                accent: '#FF4D4D',
              }
            },
            boxShadow: {
              'soft': '0 2px 8px rgba(0,0,0,0.05)',
              'sharp': '2px 2px 0px 0px rgba(0,0,0,0.1)',
            },
            animation: {
              marquee: 'marquee 30s linear infinite',
              'marquee-vertical-up': 'marqueeUp 40s linear infinite',
              'marquee-vertical-down': 'marqueeDown 40s linear infinite',
              'scan-line': 'scanline 2s ease-in-out forwards',
              'blink': 'blink 1s step-end infinite',
              'slide-up-fade': 'slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            },
            keyframes: {
              marquee: {
                '0%': { transform: 'translateX(0%)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              marqueeUp: {
                '0%': { transform: 'translateY(0%)' },
                '100%': { transform: 'translateY(-50%)' },
              },
              marqueeDown: {
                '0%': { transform: 'translateY(-50%)' },
                '100%': { transform: 'translateY(0%)' },
              },
              scanline: {
                '0%': { top: '0%', opacity: '0' },
                '10%': { opacity: '1' },
                '90%': { opacity: '1' },
                '100%': { top: '100%', opacity: '0' },
              },
              blink: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0' },
              },
              slideUpFade: {
                '0%': { opacity: '0', transform: 'translateY(40px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --grid-color: rgba(0, 0, 0, 0.03); /* Much subtler grid */
      }
      
      /* Global Scale Down: 12px is 75% of the default 16px */
      html {
        font-size: 12px; 
      }

      body {
        background-color: #FAFAFA;
        color: #222222;
        word-break: keep-all;
        overflow-wrap: break-word;
      }
      
      /* 1. Subtle Engineering Grid */
      .bg-grid-engineering {
        background-image:
          linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
          linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      /* 2. Hatching Pattern - Lighter */
      .bg-hatch {
        background-image: repeating-linear-gradient(
          45deg,
          transparent,
          transparent 4px,
          rgba(0, 0, 0, 0.03) 4px,
          rgba(0, 0, 0, 0.03) 5px
        );
      }
      
      .bg-hatch-blue {
        background-image: repeating-linear-gradient(
          45deg,
          transparent,
          transparent 4px,
          rgba(0, 82, 204, 0.03) 4px,
          rgba(0, 82, 204, 0.03) 5px
        );
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #e5e5e5; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #d4d4d4; }
    </style>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
