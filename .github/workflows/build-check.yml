name: Build Check

# 왜: persona 커밋이 타입 미반영 상태로 merge돼 프로덕션 빌드를 파괴한 사고(2026-04-18) 재발 방지.
# main 브랜치로의 PR·push 에서 tsc + next build를 모두 통과해야만 merge 가능하도록 게이트.
#
# branch protection rule과 조합: Settings → Branches → main → Require status checks to pass
# → "Build Check / build" 체크 → main push/PR merge 전 필수 통과.

on:
  pull_request:
    branches: [main]
    paths:
      - 'main/**'
      - '.github/workflows/build-check.yml'
  push:
    branches: [main]
    paths:
      - 'main/**'
      - '.github/workflows/build-check.yml'

jobs:
  build:
    # Ruleset 'TypeCheck+Next Build' (공백 없음) 와 매칭해야 required status check 통과.
    name: TypeCheck+Next Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Vercel 빌드 환경 최대한 흉내 — 동일한 Node/npm 버전으로 로컬 성공 = CI 성공 보장
    defaults:
      run:
        working-directory: main

    env:
      # 빌드 타임에만 사용되는 public env — 미설정 시 일부 코드가 undefined 참조해 깨질 수 있어
      # 더미 값으로 채움. 실제 Supabase 호출은 런타임이라 build 통과에 영향 없음.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://dummy.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'dummy-anon-key-for-ci' }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://dailydraft.me' }}
      # Server-only. Next build 의 page data collection 이 module-level Supabase client
      # 초기화를 거치는 route (예: /api/coffee-chat/notify) 때문에 dummy 필요.
      # 실제 서버 호출은 Vercel 런타임 secret 으로 대체됨.
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'dummy-service-role-key-for-build' }}
      # 외부 API 키들도 build collect 중 참조될 수 있어 dummy.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'dummy' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'dummy' }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'dummy' }}
      CRON_SECRET: ${{ secrets.CRON_SECRET || 'dummy' }}
      COOKIE_SECRET: ${{ secrets.COOKIE_SECRET || 'dummy-cookie-secret-for-build-only' }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL || '' }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        # 왜 22: 로컬 개발이 Node 24 이고 lock 파일도 그 기준으로 생성됨.
        # Node 20 에선 npm 10 이 lock 해석 불일치(typescript peer dep mismatch) 발생.
        # camera-controls@3.1.2 등 일부 패키지도 node>=22 요구.
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: main/package-lock.json

      - name: Install dependencies
        # npm install (lock 자동 보정) — CI 환경 차이로 인한 peer dep 이슈 회피.
        # lock 변동은 npm diff 로 사후 검출 가능.
        run: npm install --no-audit --no-fund

      - name: TypeScript type check
        # 왜 database.ts pre-existing 에러 필터: 이 파일은 Supabase CLI 출력인데 프로젝트 세션 중
        # 상단/하단 손상된 적 있음. 현재 복구됐지만 CLI 재생성 시 다시 깨질 수 있어 grep 제외 유지.
        # 해당 파일 의존 에러가 있으면 다른 파일에서도 잡히므로 이중 안전.
        run: |
          npx tsc --noEmit 2>&1 | tee tsc-output.log
          ERRORS=$(grep -v "src/types/database.ts" tsc-output.log | grep -c "error TS" || true)
          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ TypeScript errors found (excluding database.ts pre-existing):"
            grep -v "src/types/database.ts" tsc-output.log | grep "error TS" || true
            exit 1
          fi
          echo "✅ TypeScript check passed"

      - name: Next.js production build
        run: npm run build
