name: E2E Tests

# Playwright E2E — dev 서버를 백그라운드로 띄우고 스모크 테스트 실행.
# main 으로의 PR 에서만 돌려서 CI 시간/비용 최소화 (push 에선 build-check 이 먼저 막아줌).
#
# 실패하면 playwright-report artifact 업로드 → 디버깅 가능.

on:
  pull_request:
    branches: [main]
    paths:
      - 'main/**'
      - '.github/workflows/e2e.yml'

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: main

    env:
      # 더미 env — dev 서버 부팅용. 실제 Supabase 호출 없는 스모크 테스트라 dummy 로 충분.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://dummy.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'dummy-anon-key-for-ci' }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'dummy-service-role-key-for-build' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'dummy' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'dummy' }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'dummy' }}
      CRON_SECRET: ${{ secrets.CRON_SECRET || 'dummy' }}
      COOKIE_SECRET: ${{ secrets.COOKIE_SECRET || 'dummy-cookie-secret-for-build-only' }}
      E2E_BASE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: main/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js (production mode for stability)
        run: npm run build

      - name: Start Next.js server (background)
        # 왜 start 대신 next start (prod 빌드): turbopack dev HMR 없이 더 빠르고 안정적
        run: |
          npm run start &
          echo "Server PID: $!"
          # 부팅 대기
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Playwright tests (chromium only)
        # mobile-chrome 은 별도 러너 비용이라 PR 에선 chromium 만. 필요시 nightly로 확장.
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: main/playwright-report/
          retention-days: 7
