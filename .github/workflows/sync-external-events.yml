name: Sync External Events

on:
  schedule:
    # 매일 새벽 3시 (KST 12시)
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      enable_ai:
        description: 'Enable AI processing (tag classification & embeddings)'
        required: false
        default: 'true'
        type: boolean

jobs:
  sync-events:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: event-collector

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: event-collector/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run event sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ inputs.enable_ai }}" = "false" ]; then
            npm run sync -- --no-ai
          else
            npm run sync
          fi

      - name: Report results
        if: always()
        run: |
          echo "Sync completed at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
