<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>여백 비교 테스트</title>
    <style>
        @page { size: A4; margin: 0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "맑은 고딕", sans-serif; font-size: 10pt; background: #eee; }
        
        .page {
            width: 210mm;
            height: 297mm;
            background: white;
            margin: 0 auto 5mm auto;
            position: relative;
        }
        
        /* 25mm 상단 여백 테스트 */
        .page-25 {
            padding: 25mm 20mm 30mm 20mm;
        }
        
        /* 20mm 상단 여백 테스트 */
        .page-20 {
            padding: 20mm 20mm 30mm 20mm;
        }
        
        .notice-box {
            border: 1px solid #000;
            padding: 3mm;
            font-size: 10pt;
        }
        
        .label {
            position: absolute;
            top: 5mm;
            right: 5mm;
            background: #ff0;
            padding: 2mm;
            font-size: 12pt;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="page page-25">
        <div class="label">상단 25mm</div>
        <div class="notice-box">
            ※ 사업 신청 시, 사업계획서 작성 목차 페이지는 삭제하고 제출하시기 바랍니다.
        </div>
    </div>
    
    <div class="page page-20">
        <div class="label">상단 20mm</div>
        <div class="notice-box">
            ※ 사업 신청 시, 사업계획서 작성 목차 페이지는 삭제하고 제출하시기 바랍니다.
        </div>
    </div>
</body>
</html>
