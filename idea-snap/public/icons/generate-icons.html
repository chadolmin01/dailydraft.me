<!DOCTYPE html>
<html>
<head>
  <title>PWA Icon Generator</title>
</head>
<body>
  <h1>PWA Icon Generator for Idea Snap</h1>
  <p>Right-click each image and "Save image as..."</p>

  <h2>192x192</h2>
  <canvas id="icon192" width="192" height="192"></canvas>

  <h2>512x512</h2>
  <canvas id="icon512" width="512" height="512"></canvas>

  <script>
    function drawIcon(canvas) {
      const ctx = canvas.getContext('2d');
      const size = canvas.width;

      // Background gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#7c3aed');  // violet-600
      gradient.addColorStop(1, '#4f46e5');  // indigo-600
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);

      // Camera icon (simplified)
      ctx.fillStyle = 'white';
      const scale = size / 192;

      // Camera body
      ctx.beginPath();
      ctx.roundRect(40 * scale, 60 * scale, 112 * scale, 80 * scale, 12 * scale);
      ctx.fill();

      // Camera lens
      ctx.beginPath();
      ctx.arc(96 * scale, 100 * scale, 28 * scale, 0, Math.PI * 2);
      ctx.fillStyle = '#7c3aed';
      ctx.fill();

      ctx.beginPath();
      ctx.arc(96 * scale, 100 * scale, 18 * scale, 0, Math.PI * 2);
      ctx.fillStyle = 'white';
      ctx.fill();

      // Flash
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.roundRect(50 * scale, 50 * scale, 30 * scale, 15 * scale, 4 * scale);
      ctx.fill();

      // Lightbulb (small, bottom right)
      ctx.fillStyle = '#fbbf24';  // amber-400
      ctx.beginPath();
      ctx.arc(140 * scale, 130 * scale, 16 * scale, 0, Math.PI * 2);
      ctx.fill();
    }

    drawIcon(document.getElementById('icon192'));
    drawIcon(document.getElementById('icon512'));
  </script>
</body>
</html>
