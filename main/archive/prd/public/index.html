<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRD Generator</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,sans-serif;max-width:1200px;margin:0 auto;padding:40px 20px;background:#fafafa}
    h1{text-align:center;margin-bottom:10px}
    .subtitle{text-align:center;color:#666;margin-bottom:40px}
    .input-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-bottom:30px}
    @media(max-width:768px){.input-grid{grid-template-columns:1fr}}
    .input-card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .input-card label{display:block;font-weight:600;margin-bottom:10px}
    textarea{width:100%;height:120px;padding:12px;font-size:14px;border:2px solid #e0e0e0;border-radius:8px;resize:vertical}
    textarea:focus{outline:none;border-color:#4a90d9}
    button{display:block;width:100%;max-width:400px;margin:0 auto 30px;padding:16px;font-size:18px;font-weight:600;background:#4a90d9;color:#fff;border:none;border-radius:8px;cursor:pointer}
    button:hover{background:#3a7bc8}
    button:disabled{background:#ccc}
    .loading{text-align:center;padding:60px;display:none}
    .loading.show{display:block}
    .spinner{width:40px;height:40px;border:4px solid #e0e0e0;border-top-color:#4a90d9;border-radius:50%;margin:0 auto 20px;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .result{display:none}
    .result.show{display:block}
    .section{background:#fff;padding:24px;border-radius:12px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .section h2{font-size:18px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #4a90d9}
    .section h3{font-size:14px;color:#666;margin:12px 0 6px}
    .section p{font-size:15px;line-height:1.6}
    .feature{background:#f5f5f5;padding:14px;border-radius:8px;margin-bottom:10px}
    .priority{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600;margin-left:8px}
    .p0{background:#ffcdd2;color:#c62828}
    .p1{background:#fff9c4;color:#f57f17}
    .p2{background:#e0e0e0;color:#616161}
    .question{background:#fff3e0;padding:14px;border-radius:8px;margin-bottom:10px;border-left:4px solid #ff9800}
    .tags{display:flex;flex-wrap:wrap;gap:8px}
    .tag{background:#e3f2fd;padding:4px 10px;border-radius:4px;font-size:13px;color:#1565c0}
    .next-steps{background:#e8f5e9;border:2px solid #4caf50;padding:24px;border-radius:12px;margin-bottom:20px}
    .next-steps h2{color:#2e7d32;border-bottom:2px solid #4caf50}
    .action-box{background:#fff;padding:16px;border-radius:8px;margin-bottom:12px;border-left:4px solid #4caf50}
    .action-box.warning{border-left-color:#ff9800;background:#fffde7}
    .action-box h4{margin-bottom:8px;font-size:14px;color:#666}
    .action-box p{font-size:16px;font-weight:600;color:#333}
    .scope-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    .scope-item{background:#c8e6c9;padding:6px 12px;border-radius:6px;font-size:14px;color:#2e7d32}
    .skip-item{background:#ffccbc;padding:6px 12px;border-radius:6px;font-size:14px;color:#bf360c;text-decoration:line-through}
    .retry{background:#666;margin-top:20px}
  </style>
</head>
<body>
  <h1>PRD Generator</h1>
  <p class="subtitle">4명의 팀원 의견을 취합하여 PRD 초안을 생성합니다</p>

  <div id="input">
    <div class="input-grid">
      <div class="input-card"><label>창업자 아이디어</label><textarea id="founder" placeholder="예: 반려동물 헬스케어 앱"></textarea></div>
      <div class="input-card"><label>기획자 코멘트</label><textarea id="planner" placeholder="예: 구독 모델"></textarea></div>
      <div class="input-card"><label>디자이너 코멘트</label><textarea id="designer" placeholder="예: 토스처럼 깔끔하게"></textarea></div>
      <div class="input-card"><label>개발자 코멘트</label><textarea id="developer" placeholder="예: React Native"></textarea></div>
    </div>
    <button id="submit">PRD 생성하기</button>
  </div>

  <div class="loading" id="loading"><div class="spinner"></div><p>PRD 생성 중...</p></div>

  <div class="result" id="result">
    <div class="section"><h2>Elevator Pitch</h2><p id="pitch"></p></div>
    <div class="section"><h2>Problem & Target</h2><h3>페르소나</h3><p id="persona"></p><h3>페인포인트</h3><p id="pain"></p><h3>현재 대안</h3><p id="alt"></p></div>
    <div class="section"><h2>Core Features</h2><div id="features"></div></div>
    <div class="section"><h2>Role Perspectives</h2><h3>Business</h3><p id="biz"></p><h3>Design</h3><div id="design"></div><h3>Tech</h3><div id="tech"></div></div>
    <div class="section"><h2>Open Questions</h2><div id="questions"></div></div>
    <div class="section next-steps"><h2>Next Steps</h2><div id="nextsteps"></div></div>
    <button class="retry" id="retry">다시 생성</button>
  </div>

  <script>
    const $=id=>document.getElementById(id);
    $('submit').onclick=async()=>{
      const founder=$('founder').value.trim();
      if(!founder){alert('창업자 아이디어 입력 필요');return}
      $('input').style.display='none';
      $('loading').classList.add('show');
      $('result').classList.remove('show');
      try{
        const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({founder,planner:$('planner').value,designer:$('designer').value,developer:$('developer').value})}).then(r=>r.json());
        if(!res.success)throw new Error(res.error);
        render(res.data);
      }catch(e){alert('오류: '+e.message);$('input').style.display='block'}
      finally{$('loading').classList.remove('show')}
    };
    $('retry').onclick=()=>{$('result').classList.remove('show');$('input').style.display='block'};
    function render(d){
      const p=Array.isArray(d)?d[0]:d;
      $('pitch').textContent=p.elevator_pitch;
      $('persona').textContent=p.problem_and_target.persona;
      $('pain').textContent=p.problem_and_target.pain_point;
      $('alt').textContent=p.problem_and_target.current_alternative;
      $('features').innerHTML=p.core_features.map(f=>`<div class="feature"><strong>${f.feature_name}</strong><span class="priority ${f.priority.toLowerCase()}">${f.priority}</span><p style="margin-top:8px;font-size:14px;color:#555">${f.user_story}</p></div>`).join('');
      $('biz').innerHTML=`<strong>수익:</strong> ${p.role_perspectives.business.monetization}<br><strong>지표:</strong> ${p.role_perspectives.business.key_metrics}`;
      $('design').innerHTML=`<div class="tags">${p.role_perspectives.design.mood_keywords.map(k=>`<span class="tag">${k}</span>`).join('')}</div><p style="margin-top:8px"><strong>레퍼런스:</strong> ${p.role_perspectives.design.references.join(', ')}</p>`;
      $('tech').innerHTML=`<div class="tags">${p.role_perspectives.tech.expected_stack.map(s=>`<span class="tag">${s}</span>`).join('')}</div><p style="margin-top:8px"><strong>리스크:</strong> ${p.role_perspectives.tech.technical_risks}</p>`;
      $('questions').innerHTML=p.open_questions.map(q=>`<div class="question"><strong>${q.issue}</strong><p style="margin-top:8px;font-size:14px">AI: ${q.ai_suggestion}</p></div>`).join('');
      if(p.next_steps){
        const ns=p.next_steps;
        $('nextsteps').innerHTML=`
          <div class="action-box"><h4>즉시 실행</h4><p>${ns.immediate_action}</p></div>
          <div class="action-box"><h4>MVP 범위</h4><div class="scope-list">${ns.mvp_scope.map(s=>`<span class="scope-item">${s}</span>`).join('')}</div></div>
          <div class="action-box warning"><h4>나중에 할 것</h4><div class="scope-list">${ns.skip_for_now.map(s=>`<span class="skip-item">${s}</span>`).join('')}</div></div>
          <div class="action-box"><h4>이번 주 결정 사항</h4><p>${ns.decision_needed}</p></div>
        `;
      }
      $('result').classList.add('show');
    }
  </script>
</body>
</html>
