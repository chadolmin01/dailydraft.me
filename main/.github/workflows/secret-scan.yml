name: Secret Scan

# 커밋·PR 시점에 시크릿 누출 감지. Meta 리뷰 §10 / 엔터프라이즈 실사 §9
# "secret-scanning CI" 체크 항목 대응.
#
# 범위:
#   - gitleaks: 규칙 기반 패턴 매칭 (AWS/Supabase/Anthropic/Meta/Discord/Vercel 등)
#   - trufflehog: 엔트로피 + 정규식 하이브리드, 검증된 자격증명만 탐지
#
# 2개 도구를 병행하는 이유: gitleaks 는 패턴에 약한 새 서비스(예: THREADS_CLIENT_SECRET)
# 도 휴리스틱으로 잡고, trufflehog 는 노이즈 적음. 서로 보완.

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  # 수동 실행 — 배포 직후 복기 용
  workflow_dispatch:
  # 주간 전체 히스토리 재스캔 — 과거에 누락된 시크릿 뒤늦게 잡기 위함
  schedule:
    - cron: '0 17 * * 0'  # 매주 일요일 02:00 KST

# PR 동시 실행 취소 — 같은 브랜치 다수 푸시 시 최신만 실행
concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # 실패 시 PR 댓글 첨부용

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          # 전체 히스토리 — 과거 커밋에 섞인 시크릿도 탐지
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 기본 규칙 + 프로젝트 추가 규칙 (있으면 .gitleaks.toml 자동 인식)
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true

  trufflehog:
    name: TruffleHog (verified only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          # --only-verified: 실제 유효한 자격증명만 리포트 (노이즈 제거)
          extra_args: --only-verified --fail
