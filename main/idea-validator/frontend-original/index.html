      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],

            colors: {
              draft: {
                black: '#121212',
                gray: '#F5F5F7',
                border: '#E1E1E1',

              }
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',

          }

      }

    <style>
