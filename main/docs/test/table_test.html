<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>테이블 테스트 - 실제 비율</title>
    <style>
        @page { size: A4; margin: 0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "맑은 고딕", sans-serif;
            font-size: 10pt;
            background: #eee;
        }
        .page {
            width: 210mm;
            height: 297mm;
            padding: 30mm 20mm;
            background: white;
            margin: 0 auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #000;
            padding: 2mm 2mm;
            font-size: 10pt;
            vertical-align: middle;
            word-break: keep-all;
        }
        th { background: #d9d9d9; text-align: center; }
        .sub-title {
            font-weight: bold;
            margin: 5mm 0 3mm 0;
        }
    </style>
</head>
<body>
<div class="page">
    <div class="sub-title">< 사업추진 일정(협약기간 내) ></div>
    <table>
        <colgroup>
            <col style="width: 8%">
            <col style="width: 31%">
            <col style="width: 24%">
            <col style="width: 37%">
        </colgroup>
        <tr>
            <th>구분</th>
            <th>추진 내용</th>
            <th>추진 기간</th>
            <th>세부 내용</th>
        </tr>
        <tr>
            <td style="text-align:center">1</td>
            <td>필수 개발 인력 채용</td>
            <td style="text-align:center">00.00 ~ 00.00</td>
            <td>OO 전공 경력 직원 00명 채용</td>
        </tr>
        <tr>
            <td style="text-align:center">2</td>
            <td>제품 패키지 디자인</td>
            <td style="text-align:center">00.00 ~ 00.00</td>
            <td>제품 패키지 디자인 용역 진행</td>
        </tr>
        <tr>
            <td style="text-align:center">3</td>
            <td>홍보용 웹사이트 제작</td>
            <td style="text-align:center">00.00 ~ 00.00</td>
            <td>웹사이트 자체 제작</td>
        </tr>
        <tr>
            <td style="text-align:center">4</td>
            <td>시제품 완성</td>
            <td style="text-align:center">협약기간 말</td>
            <td>협약기간 내 시제품 제작 완료</td>
        </tr>
        <tr>
            <td style="text-align:center">…</td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
    </table>
</div>
</body>
</html>
