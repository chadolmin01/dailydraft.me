    <line x1="395" y1="245" x2="395" y2="255"/><line x1="415" y1="245" x2="415" y2="255"/><line x1="435" y1="245" x2="435" y2="255"/><line x1="455" y1="245" x2="455" y2="255"/><line x1="465" y1="245" x2="465" y2="255"/>
    <line x1="380" y1="170" x2="370" y2="170"/><line x1="380" y1="185" x2="370" y2="185"/><line x1="380" y1="200" x2="370" y2="200"/><line x1="380" y1="215" x2="370" y2="215"/><line x1="380" y1="230" x2="370" y2="230"/>
