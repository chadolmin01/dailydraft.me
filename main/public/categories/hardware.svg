      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#g)"/>
  <!-- Circuit grid -->
  <g stroke="rgba(100,116,139,0.3)" stroke-width="1" fill="none">
    <line x1="200" y1="150" x2="280" y2="150"/><line x1="280" y1="150" x2="280" y2="200"/>
    <line x1="280" y1="200" x2="320" y2="200"/><line x1="320" y1="200" x2="320" y2="170"/>
    <line x1="320" y1="170" x2="380" y2="170"/>
    <line x1="480" y1="170" x2="540" y2="170"/><line x1="540" y1="170" x2="540" y2="200"/>
    <line x1="540" y1="200" x2="580" y2="200"/><line x1="580" y1="200" x2="580" y2="150"/>
