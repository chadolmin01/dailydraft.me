<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#g)"/>
  <!-- Diagonal lines pattern -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
    <line x1="-100" y1="0" x2="300" y2="400"/><line x1="0" y1="0" x2="400" y2="400"/><line x1="100" y1="0" x2="500" y2="400"/>
    <line x1="200" y1="0" x2="600" y2="400"/><line x1="300" y1="0" x2="700" y2="400"/><line x1="400" y1="0" x2="800" y2="400"/>
    <line x1="500" y1="0" x2="900" y2="400"/><line x1="600" y1="0" x2="1000" y2="400"/>
  </g>
  <!-- Book shape -->
  <rect x="310" y="130" width="80" height="100" rx="4" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <rect x="310" y="130" width="4" height="100" fill="rgba(255,255,255,0.5)"/>
  <g fill="rgba(255,255,255,0.35)">
    <rect x="320" y="148" width="60" height="5" rx="2.5"/>
    <rect x="320" y="162" width="50" height="5" rx="2.5"/>
    <rect x="320" y="176" width="55" height="5" rx="2.5"/>
    <rect x="320" y="190" width="45" height="5" rx="2.5"/>
  </g>
  <!-- Second book -->
  <rect x="410" y="140" width="80" height="100" rx="4" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <rect x="410" y="140" width="4" height="100" fill="rgba(255,255,255,0.4)"/>
  <!-- Graduation cap lines -->
  <g fill="rgba(255,255,255,0.15)">
    <rect x="200" y="180" width="60" height="6" rx="3"/>
    <rect x="540" y="220" width="60" height="6" rx="3"/>
    <rect x="180" y="260" width="40" height="6" rx="3"/>
  </g>
  <circle cx="400" cy="200" r="130" fill="rgba(217,119,6,0.15)"/>
</svg>
