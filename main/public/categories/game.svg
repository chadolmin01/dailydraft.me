<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#g)"/>
  <!-- Star pattern background -->
  <g fill="rgba(255,255,255,0.08)">
    <circle cx="120" cy="80" r="2"/><circle cx="240" cy="60" r="1.5"/><circle cx="360" cy="90" r="2"/><circle cx="480" cy="50" r="1.5"/><circle cx="600" cy="80" r="2"/><circle cx="720" cy="60" r="1.5"/>
    <circle cx="160" cy="320" r="2"/><circle cx="300" cy="340" r="1.5"/><circle cx="440" cy="310" r="2"/><circle cx="560" cy="350" r="1.5"/><circle cx="680" cy="320" r="2"/>
  </g>
  <!-- Gamepad shape -->
  <rect x="310" y="160" width="180" height="100" rx="40" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- D-pad -->
  <rect x="330" y="195" width="30" height="8" rx="4" fill="rgba(255,255,255,0.4)"/>
  <rect x="340" y="185" width="10" height="28" rx="5" fill="rgba(255,255,255,0.4)"/>
  <!-- Buttons -->
  <circle cx="450" cy="195" r="7" fill="rgba(255,255,255,0.25)"/>
  <circle cx="467" cy="208" r="7" fill="rgba(255,255,255,0.25)"/>
  <circle cx="450" cy="221" r="7" fill="rgba(255,255,255,0.25)"/>
  <circle cx="433" cy="208" r="7" fill="rgba(255,255,255,0.25)"/>
  <!-- Analog stick circles -->
  <circle cx="370" cy="230" r="12" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <circle cx="430" cy="175" r="12" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <circle cx="400" cy="200" r="130" fill="rgba(190,24,93,0.12)"/>
</svg>
